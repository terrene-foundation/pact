name: Feature Request
description: Suggest a feature for the CARE Platform
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what you'd like.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
      placeholder: I'm always frustrated when...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work?
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Backend (Python API)
        - Web Dashboard (Next.js)
        - Flutter App
        - CLI / Org Builder
        - Trust Layer / EATP
        - DM Team Vertical
        - Documentation
    validations:
      required: true
