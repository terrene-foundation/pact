name: finance
description: "Finance team — budget tracking, grant management, treasury"
department: Growth

agents:
  - id: finance-team-lead
    name: Finance Team Lead
    role: "Financial operations coordination and oversight"
    constraint_envelope: finance-lead-envelope
    initial_posture: supervised
    capabilities:
      - financial_reporting
      - budget_tracking
      - expense_review
      - data_analysis
      - report_generation
      - data_visualization
  - id: finance-manager
    name: Finance Manager
    role: "Manages financial operations and reporting"
    constraint_envelope: finance-manager-envelope
    initial_posture: pseudo_agent
    capabilities:
      - financial_reporting
      - budget_tracking
      - expense_review
  - id: finance-analyst
    name: Analyst
    role: "Analyzes data and produces reports"
    constraint_envelope: finance-analyst-envelope
    initial_posture: supervised
    capabilities:
      - data_analysis
      - report_generation
      - data_visualization

envelopes:
  - id: finance-lead-envelope
    description: "Finance Team Lead: broadest authority within finance"
    financial:
      max_spend_usd: 100.0
    operational:
      allowed_actions:
        - budget_tracking
        - data_analysis
        - data_visualization
        - expense_review
        - financial_reporting
        - report_generation
      max_actions_per_day: 100
    temporal:
      active_hours_start: "06:00"
      active_hours_end: "22:00"
    data_access:
      read_paths:
        - "workspaces/finance/*"
      write_paths:
        - "workspaces/finance/*"
    communication:
      internal_only: true
      external_requires_approval: true
  - id: finance-manager-envelope
    description: "Finance Manager: financial operations and reporting"
    financial:
      max_spend_usd: 30.0
    operational:
      allowed_actions:
        - financial_reporting
        - budget_tracking
        - expense_review
      max_actions_per_day: 25
    temporal:
      active_hours_start: "08:00"
      active_hours_end: "20:00"
    data_access:
      read_paths:
        - "workspaces/finance/*"
      write_paths:
        - "workspaces/finance/reports/*"
    communication:
      internal_only: true
      external_requires_approval: true
  - id: finance-analyst-envelope
    description: "Analyst: financial data analysis"
    financial:
      max_spend_usd: 15.0
    operational:
      allowed_actions:
        - data_analysis
        - report_generation
        - data_visualization
      max_actions_per_day: 40
    temporal:
      active_hours_start: "08:00"
      active_hours_end: "20:00"
    data_access:
      read_paths:
        - "workspaces/finance/*"
      write_paths:
        - "workspaces/finance/analysis/*"
    communication:
      internal_only: true
      external_requires_approval: true

team:
  id: finance-team
  name: Finance
  workspace: ws-finance
  team_lead: finance-team-lead
  agents:
    - finance-team-lead
    - finance-manager
    - finance-analyst
